ai.menu.dialog.title=Ask A.I.
ai.menu.format.html.hint=Use semantic HTML for readability (paragraphs, headings, lists, bold, italic, tables) as appropriate to the actual substance of the answer. Do not include any hyperlinks or <a> tags. Do not add any meta heading, label, title, caption, or preamble that describes or classifies what you are producing (for example "Email Summary", "Reply Draft", "Bozza di Risposta", "Translation", "Tone Analysis", "Trustworthiness Check"); output only the actual content itself. If a heading is genuinely useful, it must describe the subject matter of the content, not the task or output type.
ai.menu.format.html.reply.hint=Your output is going to be inserted directly into the reply composer and sent as the email body, so produce only the message body itself, in HTML. Do not include any hyperlinks or <a> tags. Do not add any heading, title, label, preamble, sign-off annotation, or meta description such as "Reply", "Draft", "Bozza di Risposta". Start with the greeting (or the first line of the actual message if no greeting is appropriate) and end with the closing line the sender would actually send. Do not wrap the result in quotes or code blocks.
ai.menu.summarize.label=Summarize content
ai.menu.summarize.prompt=Summarize the content of this email
ai.menu.help-reply.label=Help me reply
ai.menu.help-reply.question=Briefly, what would you like to say?
ai.menu.help-reply.prompt=Help me reply to this email, taking into account the original message and these ideas of what I would like to say:\n\n{0}\n\n
ai.menu.analyze-tone.label=Analyze tone
ai.menu.analyze-tone.prompt=Analyze the tone of this email
ai.menu.classify-urgency.label=Classify urgency
ai.menu.classify-urgency.prompt=Classify the urgency of this email as exactly one of these categories: Urgent, Time-sensitive, Important, Informational, Promotional. State the chosen category first, then provide a brief justification (max 2 sentences) citing concrete signals from the email such as explicit deadlines, time references, sender role, and requested actions.
ai.menu.suggest-disposition.label=Suggest disposition
ai.menu.suggest-disposition.prompt=Suggest the best disposition for this email as exactly one of these categories: Reply, Follow-up, Delegate, Archive, Delete, Unsubscribe, Spam/Phishing. State the chosen category first, then provide a brief justification (max 2 sentences) citing concrete signals such as sender identity, authentication headers, explicit asks, deadlines, commercial or list-management markers, and any suspicious or deceptive indicators. Choose Spam/Phishing only when you have clear evidence of unsolicited bulk mail or an attempt to deceive the recipient.
ai.menu.extract-dates.label=Extract dates
ai.menu.extract-dates.prompt=Extract a list of dates for any appointments or other events, indicating what they refer to
ai.menu.trust.label=Verify trustworthiness
ai.menu.trust-simple.label=Simple
ai.menu.trust-simple.prompt=Verify the trustworthiness of this email
ai.menu.trust-technical.label=Technical
ai.menu.trust-technical.prompt=Verify the trustworthiness of this email source by carefully analyzing the headers, the structure of its parts, textual content and attachments
ai.menu.translate.label=Translate into another language
ai.menu.translate.question=Specify which language you want me to translate into
ai.menu.translate.prompt=Translate into {0}
ai.menu.free-question.label=Answer my question
ai.menu.free-question.question=Write your question
