ai.menu.dialog.title=Chiedi alla A.I.
ai.menu.format.html.hint=Usa HTML semantico per la leggibilit\u00e0 (paragrafi, intestazioni, elenchi, grassetto, corsivo, tabelle) in modo adeguato al contenuto effettivo della risposta. Non includere alcun link o tag <a>. Non aggiungere alcuna intestazione, etichetta, titolo, didascalia o preambolo che descriva o classifichi ci\u00f2 che stai producendo (per esempio "Riassunto Email", "Bozza di Risposta", "Traduzione", "Analisi del Tono", "Verifica Affidabilit\u00e0"); produci solo il contenuto effettivo. Se un'intestazione \u00e8 davvero utile, deve descrivere l'argomento del contenuto, non l'azione o il tipo di output.
ai.menu.format.html.reply.hint=Il tuo output verr\u00e0 inserito direttamente nel compositore di risposta ed inviato come corpo della mail, quindi produci solo il corpo del messaggio in HTML. Non includere alcun link o tag <a>. Non aggiungere alcuna intestazione, titolo, etichetta, preambolo, annotazione di firma o meta-descrizione come "Risposta", "Bozza", "Bozza di Risposta". Inizia con il saluto (o con la prima riga del messaggio effettivo se il saluto non \u00e8 opportuno) e chiudi con la riga finale che il mittente invierebbe realmente. Non racchiudere il risultato tra virgolette o in blocchi di codice.
ai.menu.summarize.label=Riassumi il contenuto
ai.menu.summarize.prompt=Riassumi il contenuto di questa email
ai.menu.help-reply.label=Aiutami a rispondere
ai.menu.help-reply.question=Brevemente cosa vorresti dire?
ai.menu.help-reply.prompt=Aiutami a rispondere a questa email, prendendo in considerazione la mail originale e queste idee di cosa vorrei dire:\n\n{0}\n\n
ai.menu.analyze-tone.label=Analizza il tono
ai.menu.analyze-tone.prompt=Analizza il tono di questa email
ai.menu.classify-urgency.label=Classifica l'urgenza
ai.menu.classify-urgency.prompt=Classifica l'urgenza di questa email scegliendo esattamente una tra queste categorie: Urgente, Tempo-dipendente, Importante, Informativa, Promozionale. Indica prima la categoria scelta, poi fornisci una breve motivazione (massimo 2 frasi) citando segnali concreti presenti nella email, come scadenze esplicite, riferimenti temporali, ruolo del mittente e azioni richieste.
ai.menu.suggest-disposition.label=Suggerisci un'azione
ai.menu.suggest-disposition.prompt=Suggerisci la migliore azione da intraprendere su questa email scegliendo esattamente una tra queste categorie: Rispondi, Da seguire, Delega, Archivia, Elimina, Disiscrivi, Spam/Phishing. Indica prima la categoria scelta, poi fornisci una breve motivazione (massimo 2 frasi) citando segnali concreti come l'identità del mittente, gli header di autenticazione, le richieste esplicite, le scadenze, i marcatori commerciali o di gestione liste, ed eventuali indicatori sospetti o ingannevoli. Scegli Spam/Phishing solo in presenza di evidenze chiare di posta massiva non richiesta o di tentativo di inganno verso il destinatario.
ai.menu.extract-dates.label=Estrai date
ai.menu.extract-dates.prompt=Estrai un elenco di date di eventuali appuntamenti o altro, indicando a cosa si riferiscono
ai.menu.trust.label=Verifica affidabilit\u00e0
ai.menu.trust-simple.label=Semplice
ai.menu.trust-simple.prompt=Verifica la affidabilit\u00e0 di questa email
ai.menu.trust-technical.label=Tecnica
ai.menu.trust-technical.prompt=Verifica la affidabilit\u00e0 di questo sorgente email analizzando bene gli header, la struttura delle parti, contenuto testuale ed allegati
